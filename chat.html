<script>
var firebaseConfig = {
  apiKey: "AIzaSyA8Dz6KXNSv_5exl4swfL1Kjz6z4Xm6PJY",
  authDomain: "universalist-5b7d9.firebaseapp.com",
  databaseURL: "https://universalist-5b7d9-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "universalist-5b7d9"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let username = localStorage.getItem("user");
if (!username) {
  username = prompt("WHATS Y0UR NICK:");
  localStorage.setItem("user", username);
}

let userId = null;
let chatRef = null;

firebase.auth().signInAnonymously().catch(console.error);

// SOLO cuando login está listo
firebase.auth().onAuthStateChanged(user => {
  if (!user) return;

  userId = user.uid;

  startPresence();
  loadUsers();
  loadChat();
  setupInput();
});

function startPresence() {
  const ref = db.ref("users/" + userId);

  ref.set({ name: username });
  ref.onDisconnect().remove();
}
function loadUsers() {
  db.ref("users").on("value", snap => {
    let users = snap.val() || {};

    document.getElementById("userList").innerHTML =
      Object.values(users)
        .map(u => "[ " + u.name + " ]")
        .join("<br>");
  });
}
function loadChat() {
  if (chatRef) chatRef.off();

  chatRef = db.ref("chat/general");

  chatRef.limitToLast(100).on("child_added", snap => {
    let d = snap.val();
    if (!d) return;

    let div = document.createElement("div");
    div.className = "msg";
    div.textContent = `[${d.user}] > ${d.text}`;

    document.getElementById("chat").appendChild(div);

    document.getElementById("chat").scrollTop =
      document.getElementById("chat").scrollHeight;
  });
}

function setupInput() {
  const input = document.getElementById("msg");

  input.addEventListener("keypress", e => {
    if (e.key === "Enter") send();
  });
}
let last = 0;
function send() {
  const input = document.getElementById("msg");
  const text = input.value.trim();

  if (!text || !userId) return;

  const now = Date.now();

  if (now - last < 1200) return;

  last = now;

  db.ref("chat/general").push({
    user: username,
    uid: userId,
    text: text,
    time: now
  });

  input.value = "";
}

</script>
