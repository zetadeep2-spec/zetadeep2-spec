<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Universal Union</title>

<link href="https://fonts.googleapis.com/css2?family=Stalinist+One&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: "Stalinist One", Arial, sans-serif;
  background: #0a0a0a;
  color: #ff2a2a;
  overflow: hidden;
}

h1 {
  text-align: center;
  font-size: 3em;
  color: red;
  margin: 10px 0;
}


#login button {
  padding: 10px;
  width: 220px;
  background: #111;
  color: red;
  border: 2px solid red;
  cursor: pointer;
  font-family: "Stalinist One", Arial, sans-serif;
  transition: 0.2s;
}


#login button:hover {
  background: red;
  color: black;
}



#sidebar {
  position: fixed;
  left: 0;
  top: 0;
  bottom: 0;
  width: 140px;
  background: #0b0b0b;
  border-right: 3px solid #ff2a2a;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding-top: 20px;
  gap: 10px;
  z-index: 5;
}

#sidebar button {
  width: 130px;
  height: 50px;
  background: #111;
  color: red;
  border: 2px solid red;
  font-family: "Stalinist One", Arial, sans-serif;

  font-size: 9px;
}

#chatBox {
  position: absolute;
  top: 120px;
  left: 140px;
  right: 180px;
  bottom: 0;
  display: flex;
  flex-direction: column;
}

#topBar {
  padding: 10px;
  background: #0b0b0b;
  border-bottom: 2px solid red;
  font-size: 1px;
}

#chat {
  flex: 1;
  overflow-y: auto;
  padding: 10px;
}

.msg {
  margin-bottom: 8px;
  padding: 10px;
  background: rgba(255,0,0,0.05);
  border-left: 3px solid red;
}

#inputBox {
  display: flex;
  padding: 10px;
  border-top: 2px solid red;
  background: #0b0b0b;
}

#msg {
  flex: 1;
  padding: 10px;
  background: #111;
  color: red;
  border: 2px solid red;
  outline: none;
  font-family: "Stalinist One", Arial, sans-serif;
}

/* USERS */
#usersPanel {
  position: fixed;
  right: 0;
  top: 0;
  bottom: 0;
  width: 180px;
  background: #0b0b0b;
  border-left: 3px solid red;
  padding: 10px;
  overflow-y: auto;
}

.userItem {
  padding: 8px;
  margin-bottom: 6px;
  border: 1px solid red;
  background: #111;
  cursor: pointer;
}

/* LOGIN */
#login {
  position: fixed;
  inset: 0;
  background: black;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  gap: 10px;
  z-index: 999;
}

#login input {
  padding: 10px;
  background: #111;
  border: 2px solid red;
  color: red;
  width: 200px;
  font-family: "Stalinist One", Arial, sans-serif;
}

/* PROFILE */
#profile {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 999;
}

#profileBox {
  background: #111;
  border: 2px solid red;
  padding: 20px;
}

@media (max-width: 768px) {

  body { overflow: auto; }

  h1 { font-size: 1.6em; }

  #sidebar {
    top: auto;
    bottom: 0;
    left: 0;
    right: 0;
    width: 100%;
    height: 60px;
    flex-direction: row;
    justify-content: space-around;
    border-right: none;
    border-top: 3px solid red;
  }

  #sidebar button {
    width: 18%;
    height: 40px;
    font-size: 1px;
  }

  #usersPanel {
    top: 80px;
    left: 0;
    right: 0;
    width: 100%;
    height: 110px;
    border-left: none;
    border-top: 3px solid red;
    display: flex;
    overflow-x: auto;
  }

  .userItem {
    min-width: 120px;
    flex-shrink: 0;
  }

  #chatBox {
    top: 200px;
    left: 0;
    right: 0;
    bottom: 60px;
  }
}
</style>
</head>

<body>

<h1>⟬UпiѵэrsΔl цni0п⟭</h1>

<!-- LOGIN -->
<div id="login">
  <input id="username" placeholder="username">
  <input id="password" type="password" placeholder="password">
  <input id="bio" placeholder="bio (register only)">
  <label><input type="checkbox" id="keep"> keep session</label>
  <button onclick="register()">register</button>
  <button onclick="login()">login</button>
</div>

<!-- SIDEBAR -->
<div id="sidebar">
  <button onclick="window.location.href='information.html'">⟬informati0n⟭</button>
  <button onclick="window.location.href='leaks.html'">⟬l3aks⟭</button>
  <button>assimilation</button>
  <button>security</button>
  <button>knowledge</button>
</div>

<!-- USERS -->
<div id="usersPanel"></div>

<!-- CHAT -->
<div id="chatBox">
  <div id="topBar">GENERAL CHAT</div>
  <div id="chat"></div>
  <div id="inputBox">
    <span style="color:red;">&gt;</span>
    <input id="msg" placeholder="type..." />
  </div>
</div>

<!-- PROFILE -->
<div id="profile">
  <div id="profileBox">
    <div style="color:red;">⟬profile⟭</div>
    <div id="pName"></div>
    <div id="pBio"></div>
    <button onclick="closeProfile()">close</button>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
firebase.initializeApp({
  apiKey: "AIzaSyA8Dz6KNSv_5exl4swfL1Kjz6z4Xm6PJY",
  authDomain: "universalist-5b7d9.firebaseapp.com",
  databaseURL: "https://universalist-5b7d9-default-rtdb.europe-west1.firebasedatabase.app"
});

const db = firebase.database();

let username=null,userId=null;


function esc(s){
  return String(s)
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;");
}

function register(){
  const u=usernameInput();
  const p=passwordInput();
  const b=document.getElementById("bio").value;

  db.ref("accounts/"+u).once("value").then(s=>{
    if(s.exists()) return alert("exists");

    db.ref("accounts/"+u).set({
      password:p,
      bio:esc(b)
    });

    login();
  });
}

function login(){
  const u=usernameInput();
  const p=passwordInput();

  db.ref("accounts/"+u).once("value").then(s=>{
    if(!s.exists()) return alert("no user");

    const d=s.val();
    if(d.password!==p) return alert("wrong pass");

    username=u;
    userId=u;

    if(document.getElementById("keep").checked)
      localStorage.setItem("session",u);

    start(d.bio);
  });
}

window.onload=()=>{
  const s=localStorage.getItem("session");
  if(!s) return;

  db.ref("accounts/"+s).once("value").then(x=>{
    if(!x.exists()) return;

    username=s;
    userId=s;
    start(x.val().bio);
  });
};

function start(bio){
  document.getElementById("login").style.display="none";

  db.ref("users/"+userId).set({
    name:esc(username),
    bio:esc(bio||""),
    uid:userId
  });

  loadUsers();
  loadChat();
}

function loadUsers(){
  db.ref("users").on("value",snap=>{
    const u=snap.val()||{};
    const panel=document.getElementById("usersPanel");

    panel.innerHTML="";

    Object.values(u).forEach(x=>{
      const div=document.createElement("div");
      div.className="userItem";

      div.innerHTML=
        "⟬profile⟭<br>" +
        "<b>"+esc(x.name)+"</b><br>" +
        "<small>"+esc(x.bio||"")+"</small>";

      div.onclick=()=>openProfile(x.uid);

      panel.appendChild(div);
    });
  });
}

function loadChat(){
  db.ref("chat/general").limitToLast(100).on("child_added",s=>{
    const d=s.val();

    const div=document.createElement("div");
    div.className="msg";

    const tag=document.createElement("span");
    tag.textContent="⟬"+d.user+"⟭ ";
    tag.style.cursor="pointer";
    tag.onclick=()=>openProfile(d.uid);

    const msg=document.createElement("span");
    msg.textContent=d.text;

    div.appendChild(tag);
    div.appendChild(msg);

    document.getElementById("chat").appendChild(div);
  });
}

document.getElementById("msg").addEventListener("keypress",e=>{
  if(e.key==="Enter") send();
});

function send(){
  const t=document.getElementById("msg").value.trim();
  if(!t) return;

  db.ref("chat/general").push({
    user:username,
    uid:userId,
    text:t
  });

  document.getElementById("msg").value="";
}

function openProfile(id){
  db.ref("users/"+id).once("value").then(s=>{
    const u=s.val();

    document.getElementById("pName").textContent=u.name;
    document.getElementById("pBio").textContent=u.bio;

    document.getElementById("profile").style.display="flex";
  });
}

function closeProfile(){
  document.getElementById("profile").style.display="none";
}

const usernameInput=()=>document.getElementById("username").value.trim();
const passwordInput=()=>document.getElementById("password").value.trim();
</script>

</body>
</html>
